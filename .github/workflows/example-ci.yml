name: Example CI

on:
  pull_request:
    paths:
      - "examples/ecs-firelens/**"
      - ".github/workflows/example-ci.yml"
  push:
    branches:
      - main
    paths:
      - "examples/ecs-firelens/**"
      - ".github/workflows/example-ci.yml"

permissions:
  contents: read

jobs:
  app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/ecs-firelens/app

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: examples/ecs-firelens/app/go.mod

      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "${files}" ]; then
            echo "${files}"
            exit 1
          fi

      - name: Test
        run: go test ./...

  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/ecs-firelens/infra

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.7

      - name: Check formatting
        run: terraform fmt -check -recursive

      - name: Initialize
        run: terraform init -backend=false -lockfile=readonly

      - name: Validate
        run: terraform validate

  dockerfiles:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - examples/ecs-firelens/app/Dockerfile
          - examples/ecs-firelens/fluentbit/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
